<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#f7f6f2" />
  <!-- Lock light mode regardless of OS preferences. Without this, Android
       Chrome's "Force Dark Mode" and iOS "Dark Website Appearance" can
       invert the page or apply tldraw's dark skin via prefers-color-scheme. -->
  <meta name="color-scheme" content="light" />
  <meta name="supported-color-schemes" content="light" />
  <title>river</title>
  <!-- Source Serif 4 for the body of assistant/user cards. Adobe's
       modern serif revival; covers regular + italic + bold so we can
       grow into emphasis later. UI chrome stays system-ui. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap"
  />
  <style>
    html, body, #root {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #f7f6f2;
      color-scheme: light;
      overflow: hidden;
      /* Prevent pull-to-refresh and bounce scrolling on mobile */
      overscroll-behavior: none;
      /* Tell the browser there's nothing to scroll/zoom — without this,
         React 17+ binds touch listeners as passive and tldraw's
         preventDefault() inside its onTouchStart logs warnings on every tap. */
      touch-action: none;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      color: #111;
      /* iOS: remove tap highlight + disable text size auto-adjust */
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
    }
    /* tldraw container background — injected at index.html level so
       it's applied before React mounts. Otherwise on mobile the dark
       default leaks through during the brief pre-React paint. */
    .tl-container, .tl-background { background: #f7f6f2 !important; }
    /* Hide tldraw watermark in the prototype — this is a dev-only prototype, not a production deploy. */
    .tl-watermark_SEE-LICENSE { display: none !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
